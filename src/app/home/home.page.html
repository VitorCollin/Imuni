<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Blank
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list lines="none">
    @for (crianca of criancas(); track crianca.uid) {
      <ion-card>
        <ion-card-header>
          <ion-card-title>{{crianca.nome}}</ion-card-title>
          <ion-card-subtitle>Nascimento:  {{crianca.dataNascimento | date: 'dd/MM/yyyy'}}</ion-card-subtitle>
        </ion-card-header>
      </ion-card>
    }@empty {
      <p>Nenhuma criança cadastrada ainda.</p>
    }
  </ion-list>
</ion-content>
